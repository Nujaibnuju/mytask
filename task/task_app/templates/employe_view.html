<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>
</head>

<style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            background: #333;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            background: #333;
            color: white;
            border: none;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
<body>

<h2>Employee List</h2>

<form action="" method="get">
    <input type="text" name="search" placeholder="Search">
    <button type="submit">Search</button>
</form>

<table border="1">
    <tr>
        <th>#</th>
        <th>Name</th>
        <th>Role</th>
        <th>Department</th>
        <th>Email</th>
        <th>Details</th>
        <th>Action</th>
    </tr>

    {% for e in employee %}
    <tr>
        <td>{{ e.id }}</td>
        <td>{{ e.name }}</td>
        <td>{{ e.Role }}</td>
        <td>{{ e.department.name }}</td>
        <td>{{ e.Email }}</td>

        <td>
            <a href="{% url 'employee_detail' e.id %}">
            {{ e.name }}
            </a>
        </td>
        

        <td>
            <a href="{% url 'employee_edit' e.id %}">Edit</a> |
            <a href="{% url 'employee_delete' e.id %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No employee found</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
